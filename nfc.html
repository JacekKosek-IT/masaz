<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber SPA OS - NFC Gateway</title>
    <style>
        body {
            background-color: #03050a;
            color: #00f0ff;
            font-family: 'Segoe UI', monospace, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .scanner-ring {
            width: 150px;
            height: 150px;
            border: 3px dashed #00f0ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 30px;
            animation: rotate 8s linear infinite;
        }
        .pulse {
            position: absolute;
            width: 130px;
            height: 130px;
            border: 2px solid #00ff66;
            border-radius: 50%;
            animation: pulseGlow 2s ease-out infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes pulseGlow {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        h2 { font-size: 18px; letter-spacing: 2px; margin: 10px 0; text-transform: uppercase; }
        p { color: #64748b; font-size: 12px; max-width: 280px; }
    </style>
</head>
<body>

    <div class="pulse"></div>
    <div class="scanner-ring">📳</div>
    
    <h2 id="status">ZAKODOWANA BRAMKA NFC</h2>
    <p id="info">Zbliż kartę lub brelok administratora do tyłu obudowy telefonu, aby uzyskać natychmiastowy dostęp...</p>

    <script>
        // Ta funkcja odpala się AUTOMATYCZNIE natychmiast po wejściu na stronę
        async function startAutoscan() {
            const statusText = document.getElementById('status');
            const infoText = document.getElementById('info');

            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    // Uruchamiamy sprzętowy skaner w tle
                    await ndef.scan();
                    
                    ndef.onreading = event => {
                        // KARTA WYKRYTA!
                        statusText.innerText = "🔓 DOSTĘP PRZYZNANY";
                        statusText.style.color = "#00ff66";
                        infoText.innerText = `Autoryzacja seryjna ID: ${event.serialNumber}. Przekierowanie...`;

                        // Zapisujemy w pamięci przeglądarki token bezpieczeństwa, że przeszedłeś przez NFC
                        localStorage.setItem('cyberSpaAuth', 'GRANTED_BY_NFC');

                        // Automatyczne i natychmiastowe przejście do Twojego panelu!
                        setTimeout(() => {
                            window.location.href = 'jacek.html';
                        }, 800);
                    };

                } catch (error) {
                    statusText.innerText = "❌ BŁĄD URUCHOMIENIA";
                    statusText.style.color = "#ff3333";
                    infoText.innerText = "Przeglądarka zablokowała dostęp do sensora NFC. Upewnij się, że masz włączone NFC w telefonie.";
                }
            } else {
                statusText.innerText = "❌ BRAK MODUŁU WEB NFC";
                statusText.style.color = "#ff3333";
                infoText.innerText = "Ta przeglądarka nie obsługuje automatycznego Web NFC. Uruchom tę stronę w Google Chrome na Androidzie.";
            }
        }

        // Odpalamy skanowanie od razu przy załadowaniu okna
        window.onload = startAutoscan;
    </script>
</body>
</html>
