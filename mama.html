<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber SPA OS - Ekran Mamy</title>
    <style>
        :root {
            --bg-dark: #05070f;
            --card-dark: #0b111e;
            --cyber-blue: #00f0ff;
            --neon-green: #00ff66;
            --text-main: #f8fafc;
            --text-gray: #64748b;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 450px; text-align: center; }
        .cyber-card {
            background: var(--card-dark);
            border: 1px solid #1e293b;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }
        .status-box {
            padding: 15px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #ff3333;
            background: rgba(255, 51, 51, 0.05);
            color: #ff3333;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .status-box.active {
            border-color: var(--neon-green);
            background: rgba(0, 255, 66, 0.05);
            color: var(--neon-green);
        }
        .section-title {
            font-size: 13px;
            color: var(--cyber-blue);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 20px 0 10px 0;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .tile {
            background: #101726;
            border: 2px solid #24324d;
            border-radius: 14px;
            padding: 20px 5px;
            font-weight: bold;
            font-size: 14px;
            color: white;
            transition: all 0.3s;
        }
        .tile.available { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0, 255, 102, 0.1); }
        .tile.used {
            background: #070a12;
            border-color: #1a2333;
            color: var(--text-gray);
            text-decoration: line-through;
            opacity: 0.25;
        }
        .live-timer-banner {
            background: rgba(245, 158, 11, 0.1);
            border: 1px dashed #f59e0b;
            color: #f59e0b;
            border-radius: 14px;
            padding: 15px;
            font-size: 22px;
            font-family: monospace;
            font-weight: bold;
            margin-top: 15px;
            display: none;
        }
        .info-date { color: #f59e0b; font-size: 13px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="cyber-card">
            <h1 style="margin:0; font-size:26px;">CYBER SPA JACKA</h1>
            <p style="color: var(--text-gray); font-size: 12px; margin: 5px 0 0 0;">SYSTEM SYNC: ONLINE</p>
        </div>

        <div id="status-bar" class="status-box">❌ BRAK AKTYWNYCH USŁUG W BAZIE</div>
        <div id="expiration-bar" class="info-date" style="display: none;"></div>

        <div id="content-layer" style="opacity: 0.2;">
            <div class="section-title">
                <span>💆‍♂️ Masaże Pleców</span>
                <span id="p-counter">0/0</span>
            </div>
            <div class="grid" id="plecy-grid"></div>

            <div class="section-title">
                <span>🦶 Masaże Stóp</span>
                <span id="s-counter">0/0</span>
            </div>
            <div class="grid" id="stopy-grid"></div>
        </div>

        <div id="mamy-clock-box" class="live-timer-banner">
            ⏱️ SEANS TRWA: <span id="mamy-time">00:00</span>
        </div>
    </div>

    <script>
        function updateScreen() {
            const rawData = localStorage.getItem('cyberSpaData');
            if (!rawData) return;

            const data = JSON.parse(rawData);

            // Aktualizacja paska stanu
            const statusBar = document.getElementById('status-bar');
            statusBar.className = "status-box active";
            statusBar.innerText = `⚡ AKTYWNY: ${data.name.toUpperCase()}`;

            if(data.date) {
                const p = data.date.split('-');
                document.getElementById('expiration-bar').innerText = `📅 WAŻNOŚĆ KARNETU: ${p[2]}.${p[1]}.${p[0]} r.`;
                document.getElementById('expiration-bar').style.display = "block";
            }

            document.getElementById('content-layer').style.opacity = "1";

            // Budowanie klocków
            document.getElementById('plecy-grid').innerHTML = data.plecy.map((av, i) => 
                `<div class="tile ${av ? 'available' : 'used'}">Seans ${i+1}</div>`
            ).join('');

            document.getElementById('stopy-grid').innerHTML = data.stopy.map((av, i) => 
                `<div class="tile ${av ? 'available' : 'used'}">Seans ${i+1}</div>`
            ).join('');

            const avP = data.plecy.filter(Boolean).length;
            const avS = data.stopy.filter(Boolean).length;
            document.getElementById('p-counter').innerText = `Wolne: ${avP}/${data.plecy.length}`;
            document.getElementById('s-counter').innerText = `Wolne: ${avS}/${data.stopy.length}`;

            // Obsługa stopera na żywo
            const timerBox = document.getElementById('mamy-clock-box');
            if (data.timerRunning && data.timeLeft) {
                timerBox.style.display = "block";
                document.getElementById('mamy-time').innerText = data.timeLeft;
            } else {
                timerBox.style.display = "none";
            }
        }

        // Słuchacz zdarzeń - odświeża stronę natychmiast po zmianie danych przez Jacka
        window.addEventListener('storage', updateScreen);
        setInterval(updateScreen, 500); // Dodatkowe zabezpieczenie czasowe
        updateScreen();
    </script>
</body>
</html>
